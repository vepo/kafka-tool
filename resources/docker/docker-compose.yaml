x-jbang: &jbang
  image: jbangdev/jbang:latest
  environment:
    TRUST: all
  volumes:
    - ../../scripts:/workspace/scripts:ro
  working_dir: /workspace
  depends_on:
    kafka:
      condition: service_healthy
  restart: unless-stopped

x-consumer: &consumer
  <<: *jbang
  profiles: [demo]
  command:
    - scripts/consume-economic-index
    - --bootstrap-servers
    - kafka:9092

services:
  kafka:
    image: vepo/kafka:latest
    container_name: kafka-tool-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./volume/kafka/data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:8.3.0
    container_name: kafka-tool-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  economic-index-producer:
    <<: *jbang
    profiles: [demo]
    container_name: kafka-tool-economic-producer
    command:
      - scripts/produce-economic-indexes
      - --bootstrap-servers
      - kafka:9092

  cpi-consumer-1:
    <<: *consumer
    container_name: kafka-tool-cpi-consumer-1
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-cpi
      - --group
      - cpi-analytics
      - --instance-id
      - "1"

  cpi-consumer-2:
    <<: *consumer
    container_name: kafka-tool-cpi-consumer-2
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-cpi
      - --group
      - cpi-analytics
      - --instance-id
      - "2"

  gdp-consumer-1:
    <<: *consumer
    container_name: kafka-tool-gdp-consumer-1
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-gdp
      - --group
      - gdp-analytics
      - --instance-id
      - "1"

  gdp-consumer-2:
    <<: *consumer
    container_name: kafka-tool-gdp-consumer-2
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-gdp
      - --group
      - gdp-analytics
      - --instance-id
      - "2"

  unemployment-consumer-1:
    <<: *consumer
    container_name: kafka-tool-unemployment-consumer-1
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-unemployment
      - --group
      - unemployment-analytics
      - --instance-id
      - "1"

  unemployment-consumer-2:
    <<: *consumer
    container_name: kafka-tool-unemployment-consumer-2
    command:
      - scripts/consume-economic-index
      - --bootstrap-servers
      - kafka:9092
      - --topic
      - economic-unemployment
      - --group
      - unemployment-analytics
      - --instance-id
      - "2"
