name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, without v prefix, e.g. 0.0.3)'
        required: true
        type: string
      ref:
        description: 'Branch or commit to release from'
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-prepare-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Test and tag release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify pom.xml version matches release input
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          POM_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [ "$POM_VERSION" != "$RELEASE_VERSION" ]; then
            echo "pom.xml version ($POM_VERSION) does not match release version ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Guard against duplicate release tag
        env:
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          git fetch --tags --force origin
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
            exit 1
          fi

      - name: Run unit tests
        run: mvn -B verify

      - name: Run Kafka bridge integration tests (Testcontainers)
        run: mvn -B verify -Dkafka.integration=true

      - name: Create and push release tag
        env:
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"
