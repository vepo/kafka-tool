name: Prepare release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to release from (must end with -SNAPSHOT in pom.xml)'
        required: false
        default: main
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-prepare-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Test and tag release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Resolve release and next snapshot versions
        id: versions
        run: |
          POM_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [[ "$POM_VERSION" != *-SNAPSHOT ]]; then
            echo "Expected a -SNAPSHOT version in pom.xml, got: $POM_VERSION"
            exit 1
          fi
          RELEASE_VERSION="${POM_VERSION%-SNAPSHOT}"
          IFS='.' read -r major minor patch <<< "$RELEASE_VERSION"
          if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
            echo "Could not parse semver from release version: $RELEASE_VERSION"
            exit 1
          fi
          NEXT_SNAPSHOT="${major}.${minor}.$((patch + 1))-SNAPSHOT"
          echo "pom_version=$POM_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_snapshot=$NEXT_SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Guard against duplicate release tag
        env:
          RELEASE_TAG: ${{ steps.versions.outputs.release_tag }}
        run: |
          git fetch --tags --force origin
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists"
            exit 1
          fi

      - name: Run unit tests
        run: mvn -B verify

      - name: Run Kafka bridge integration tests (Testcontainers)
        run: mvn -B verify -Dkafka.integration=true

      - name: Set release version, tag, and bump to next snapshot
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.release_version }}
          NEXT_SNAPSHOT: ${{ steps.versions.outputs.next_snapshot }}
          RELEASE_TAG: ${{ steps.versions.outputs.release_tag }}
          RELEASE_BRANCH: ${{ inputs.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mvn -B org.codehaus.mojo:versions-maven-plugin:2.18.0:set \
            -DnewVersion="$RELEASE_VERSION" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Release $RELEASE_VERSION"

          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"

          mvn -B org.codehaus.mojo:versions-maven-plugin:2.18.0:set \
            -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Start next development iteration $NEXT_SNAPSHOT"

          git push origin "HEAD:$RELEASE_BRANCH"
          git push origin "$RELEASE_TAG"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.versions.outputs.release_tag }}
        run: gh workflow run build-artifact.yml --ref "$RELEASE_TAG"
